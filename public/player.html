<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Live - Player</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --panel: rgba(17,24,39,.95);
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --green: #22c55e;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --red: #ef4444;
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, var(--bg), var(--bg-2));
      color: var(--text);
      padding: 16px;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(100%, 700px);
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 20px 40px rgba(0,0,0,.28);
      padding: 20px;
      display: grid;
      gap: 16px;
    }
    h1, h2, p { margin: 0; }
    .muted { color: var(--muted); }
    input, button, textarea {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
    }
    input, textarea {
      background: #0b1220;
      color: white;
      border: 1px solid rgba(255,255,255,.12);
    }
    button { font-weight: 800; cursor: pointer; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .joinBtn { background: var(--green); color: #052e16; }
    .submitBtn { background: var(--yellow); color: #422006; }
    .smallBtn { width: auto; padding: 12px 14px; background: var(--blue); color: white; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .answerBtn {
      background: var(--panel-2);
      color: white;
      min-height: 90px;
      line-height: 1.3;
    }
    .answerBtn.true { background: #14532d; }
    .answerBtn.false { background: #7f1d1d; }
    .toolbar { display: flex; gap: 10px; justify-content: flex-end; }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--panel-2);
      border-radius: 16px;
      padding: 14px;
    }
    .ghost {
      background: transparent;
      border: 1px dashed rgba(255,255,255,.2);
      color: var(--muted);
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(59,130,246,.15);
      color: #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
    }
    .timer {
      font-size: 30px;
      font-weight: 900;
      color: #fde68a;
    }

    .orderHelp {
      font-size: 14px;
      line-height: 1.4;
      color: var(--muted);
      margin-top: -4px;
    }
    .orderList {
      display: grid;
      gap: 10px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .dragRow {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      background: var(--panel-2);
      border-radius: 16px;
      padding: 14px;
      border: 2px solid transparent;
      position: relative;
      touch-action: none;
      box-shadow: 0 8px 18px rgba(0,0,0,.16);
    }
    .dragRow.dragging-source {
      opacity: .18;
      border-style: dashed;
      border-color: rgba(255,255,255,.25);
    }
    .dragRow.drag-over {
      border-color: rgba(59,130,246,.85);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }
    .dragClone {
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: min(680px, calc(100vw - 24px));
      max-width: calc(100vw - 24px);
      pointer-events: none;
      transform: translate3d(0,0,0);
      opacity: .96;
      box-shadow: 0 22px 40px rgba(0,0,0,.32);
    }
    .dragHandle {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      color: #bfdbfe;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }
    .orderIndex {
      min-width: 28px;
      font-weight: 900;
      color: #bfdbfe;
    }
    .orderText {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }

    @media (max-width: 560px) {
      .grid2 { grid-template-columns: 1fr; }
      .dragRow {
        grid-template-columns: auto 1fr;
      }
      .dragHandle {
        order: 3;
        width: 36px;
        height: 36px;
        justify-self: end;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="app"></div>
  </div>

  <script>
    const socket = io();
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);

    let roomCode = params.get('room')?.toUpperCase() || '';
    let playerName = '';
    let joined = false;
    let answered = false;
    let currentQuestion = null;
    let orderItems = [];
    let roomTitle = 'Quiz Live';
    let displayMode = 'host-only';
    let questionTimer = null;
    let questionDeadline = null;
    let currentDrag = null;

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderJoin(message = '') {
      app.innerHTML = `
        <h1>📱 Entra nel quiz</h1>
        <p class="muted">Inserisci il codice stanza e il tuo nome.</p>
        <input id="roomInput" placeholder="Codice stanza" maxlength="6" value="${escapeHtml(roomCode)}" />
        <input id="nameInput" placeholder="Il tuo nome" maxlength="20" value="${escapeHtml(playerName)}" />
        <button class="joinBtn" id="joinBtn">Entra</button>
        <p id="joinMsg" class="muted">${escapeHtml(message)}</p>
      `;

      document.getElementById('joinBtn').addEventListener('click', () => {
        roomCode = document.getElementById('roomInput').value.trim().toUpperCase();
        playerName = document.getElementById('nameInput').value.trim();
        socket.emit('player:joinRoom', { roomCode, name: playerName }, (res) => {
          if (!res?.ok) {
            renderJoin(res?.error || 'Errore di accesso.');
            return;
          }
          joined = true;
          roomCode = res.roomCode;
          roomTitle = res.title || 'Quiz Live';
          displayMode = res.displayMode || 'host-only';
          renderWaiting('Sei entrato nella lobby. Aspetta la prima domanda.');
        });
      });
    }

    function renderHeader(extra = '') {
      return `
        <div>
          <h1>${escapeHtml(roomTitle)}</h1>
          <p class="muted"><strong>${escapeHtml(playerName || 'Giocatore')}</strong> • stanza ${escapeHtml(roomCode)}</p>
        </div>
        ${extra}
      `;
    }

    function renderWaiting(text) {
      stopQuestionTimer();
      cleanupDrag();
      app.innerHTML = `
        ${renderHeader(`
          <div class="pill">${displayModeLabel(displayMode)}</div>
        `)}
        <div class="item ghost">${escapeHtml(text)}</div>
      `;
    }

    function getRemainingSeconds(fallbackSeconds = 20) {
      if (!questionDeadline) return fallbackSeconds;
      return Math.max(1, Math.ceil((questionDeadline - Date.now()) / 1000));
    }

    function renderMissingDataMessage(meta, text) {
      cleanupDrag();
      app.innerHTML = `
        ${renderHeader(meta)}
        <div class="item ghost">${escapeHtml(text)}</div>
      `;
    }

    function renderAnswerOnly(q) {
      const seconds = q.time || 20;
      const meta = `
        <div class="meta">
          <div class="pill">Rispondi dal telefono</div>
          <div class="pill">Tempo: ${seconds}s</div>
        </div>
        <div class="timer" id="timerBox">⏱️ ${seconds}s</div>
      `;

      if (q.type === 'multiple') {
        const optionCount = Array.isArray(q.options) && q.options.length
          ? q.options.length
          : (q.optionCount || 4);

        app.innerHTML = `
          ${renderHeader(meta)}
          <div class="grid2" id="answersGrid"></div>
        `;

        const grid = document.getElementById('answersGrid');
        ['A', 'B', 'C', 'D'].slice(0, optionCount).forEach((label, idx) => {
          const btn = document.createElement('button');
          btn.className = 'answerBtn';
          btn.innerHTML = `<strong>${label}</strong>`;
          btn.addEventListener('click', () => submitAnswer({ selectedIndex: idx }));
          grid.appendChild(btn);
        });
      } else if (q.type === 'truefalse') {
        app.innerHTML = `
          ${renderHeader(meta)}
          <div class="grid2">
            <button class="answerBtn true" id="trueBtn">VERO</button>
            <button class="answerBtn false" id="falseBtn">FALSO</button>
          </div>
        `;
        document.getElementById('trueBtn').addEventListener('click', () => submitAnswer({ value: true }));
        document.getElementById('falseBtn').addEventListener('click', () => submitAnswer({ value: false }));
      } else if (q.type === 'text') {
        app.innerHTML = `
          ${renderHeader(meta)}
          <input id="textAnswer" placeholder="Scrivi qui la risposta" />
          <button class="submitBtn" id="sendText">Invia risposta</button>
        `;
        const input = document.getElementById('textAnswer');
        document.getElementById('sendText').addEventListener('click', () => submitAnswer({ text: input.value }));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') submitAnswer({ text: input.value });
        });
      } else if (q.type === 'order') {
        if (!Array.isArray(q.items) || !q.items.length) {
          renderMissingDataMessage(meta, 'Questa domanda non può essere mostrata: mancano gli elementi da ordinare.');
          return;
        }
        orderItems = q.items.map((text, idx) => ({ id: `ord-${idx}-${Date.now()}`, text }));
        renderOrderList(false);
      } else {
        renderMissingDataMessage(meta, 'Tipo di domanda non supportato.');
      }
    }

    function renderFullQuestion(q) {
      const seconds = q.time || 20;
      const header = `
        <div class="meta">
          <div class="pill">${escapeHtml(q.disciplina || 'Quiz')}</div>
          <div class="pill">${escapeHtml(q.argomento || 'Generale')}</div>
          <div class="pill">Domanda ${q.index || '—'}/${q.total || '—'}</div>
          <div class="pill">Tempo: ${seconds}s</div>
        </div>
        <div class="timer" id="timerBox">⏱️ ${seconds}s</div>
      `;

      if (q.type === 'multiple') {
        const options = Array.isArray(q.options) ? q.options : [];
        if (!options.length) {
          renderMissingDataMessage(header, 'Questa domanda non può essere mostrata: mancano le opzioni di risposta.');
          return;
        }

        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question)}</h2>
          <div class="grid2" id="answersGrid"></div>
        `;
        const grid = document.getElementById('answersGrid');
        options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'answerBtn';
          btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}</strong><br>${escapeHtml(opt)}`;
          btn.addEventListener('click', () => submitAnswer({ selectedIndex: idx }));
          grid.appendChild(btn);
        });
      } else if (q.type === 'truefalse') {
        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question)}</h2>
          <div class="grid2">
            <button class="answerBtn true" id="trueBtn">VERO</button>
            <button class="answerBtn false" id="falseBtn">FALSO</button>
          </div>
        `;
        document.getElementById('trueBtn').addEventListener('click', () => submitAnswer({ value: true }));
        document.getElementById('falseBtn').addEventListener('click', () => submitAnswer({ value: false }));
      } else if (q.type === 'text') {
        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question)}</h2>
          <input id="textAnswer" placeholder="Scrivi qui la risposta" />
          <button class="submitBtn" id="sendText">Invia risposta</button>
        `;
        const input = document.getElementById('textAnswer');
        document.getElementById('sendText').addEventListener('click', () => submitAnswer({ text: input.value }));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') submitAnswer({ text: input.value });
        });
      } else if (q.type === 'order') {
        if (!Array.isArray(q.items) || !q.items.length) {
          renderMissingDataMessage(header, 'Questa domanda non può essere mostrata: mancano gli elementi da ordinare.');
          return;
        }
        orderItems = q.items.map((text, idx) => ({ id: `ord-${idx}-${Date.now()}`, text }));
        renderOrderList(true);
      } else {
        renderMissingDataMessage(header, 'Tipo di domanda non supportato.');
      }
    }

    function renderOrderList(showQuestion) {
      const q = currentQuestion;

      if (!q || !Array.isArray(orderItems) || !orderItems.length) {
        cleanupDrag();
        app.innerHTML = `
          ${renderHeader()}
          <div class="item ghost">Nessun elemento disponibile da ordinare.</div>
        `;
        return;
      }

      const top = showQuestion
        ? `<h2>${escapeHtml(q.question)}</h2>`
        : `<div class="item ghost">Trascina gli elementi nell’ordine corretto e poi conferma.</div>`;

      const seconds = getRemainingSeconds(q.time || 20);

      cleanupDrag();
      app.innerHTML = `
        ${renderHeader(`
          <div class="meta">
            ${showQuestion
              ? `<div class="pill">${escapeHtml(q.disciplina || 'Quiz')}</div><div class="pill">${escapeHtml(q.argomento || 'Generale')}</div>`
              : '<div class="pill">Ordina dal telefono</div>'}
            <div class="pill">Tempo: ${seconds}s</div>
          </div>
          <div class="timer" id="timerBox">⏱️ ${seconds}s</div>
        `)}
        ${top}
        <p class="orderHelp">Tieni premuto e trascina ogni riga nella posizione giusta.</p>
        <div id="orderList" class="orderList"></div>
        <button class="submitBtn" id="sendOrder">Conferma ordine</button>
      `;

      const list = document.getElementById('orderList');
      orderItems.forEach((entry, idx) => {
        const row = document.createElement('div');
        row.className = 'dragRow';
        row.dataset.id = entry.id;
        row.innerHTML = `
          <div class="orderIndex">${idx + 1}.</div>
          <div class="orderText">${escapeHtml(entry.text)}</div>
          <div class="dragHandle" aria-hidden="true">⋮⋮</div>
        `;
        list.appendChild(row);
      });

      enableOrderDrag(list);

      document.getElementById('sendOrder').addEventListener('click', () => {
        submitAnswer({ order: orderItems.map(item => item.text) });
      });
    }

    function enableOrderDrag(list) {
      const rows = () => [...list.querySelectorAll('.dragRow')];

      rows().forEach((row) => {
        row.addEventListener('pointerdown', (event) => {
          if (answered) return;
          if (event.button !== undefined && event.button !== 0) return;

          event.preventDefault();

          const rect = row.getBoundingClientRect();
          const clone = row.cloneNode(true);
          clone.classList.add('dragClone');

          const offsetY = event.clientY - rect.top;
          const offsetX = event.clientX - rect.left;

          clone.style.width = `${rect.width}px`;
          clone.style.left = `${rect.left}px`;
          clone.style.top = `${rect.top}px`;
          document.body.appendChild(clone);

          row.classList.add('dragging-source');

          currentDrag = {
            list,
            row,
            clone,
            offsetY,
            offsetX,
            pointerId: event.pointerId
          };

          row.setPointerCapture?.(event.pointerId);
          moveDrag(event.clientX, event.clientY);

          const onMove = (e) => {
            if (!currentDrag || e.pointerId !== currentDrag.pointerId) return;
            e.preventDefault();
            moveDrag(e.clientX, e.clientY);
            reorderByPointer(e.clientY);
          };

          const onUp = (e) => {
            if (!currentDrag || e.pointerId !== currentDrag.pointerId) return;
            finishDrag();
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            window.removeEventListener('pointercancel', onUp);
          };

          window.addEventListener('pointermove', onMove, { passive: false });
          window.addEventListener('pointerup', onUp);
          window.addEventListener('pointercancel', onUp);
        });
      });

      function moveDrag(clientX, clientY) {
        if (!currentDrag) return;
        currentDrag.clone.style.left = `${clientX - currentDrag.offsetX}px`;
        currentDrag.clone.style.top = `${clientY - currentDrag.offsetY}px`;
      }

      function reorderByPointer(clientY) {
        if (!currentDrag) return;
        const siblings = rows().filter(el => el !== currentDrag.row);

        let target = null;
        let placeAfter = false;

        siblings.forEach((el) => {
          const rect = el.getBoundingClientRect();
          const middle = rect.top + rect.height / 2;
          el.classList.remove('drag-over');

          if (clientY < middle && !target) {
            target = el;
            placeAfter = false;
          } else if (clientY >= middle) {
            target = el;
            placeAfter = true;
          }
        });

        rows().forEach(el => el.classList.remove('drag-over'));

        if (!target) {
          list.insertBefore(currentDrag.row, list.firstChild);
          if (list.firstChild) list.firstChild.classList.add('drag-over');
          return;
        }

        target.classList.add('drag-over');
        if (placeAfter) {
          list.insertBefore(currentDrag.row, target.nextSibling);
        } else {
          list.insertBefore(currentDrag.row, target);
        }
      }

      function finishDrag() {
        if (!currentDrag) return;
        currentDrag.clone.remove();
        rows().forEach(el => {
          el.classList.remove('drag-over');
          el.classList.remove('dragging-source');
        });

        syncOrderFromDOM();
        currentDrag = null;
      }
    }

    function syncOrderFromDOM() {
      const list = document.getElementById('orderList');
      if (!list) return;

      const ids = [...list.querySelectorAll('.dragRow')].map(row => row.dataset.id);
      orderItems = ids
        .map(id => orderItems.find(item => item.id === id))
        .filter(Boolean);

      [...list.querySelectorAll('.dragRow')].forEach((row, idx) => {
        const indexEl = row.querySelector('.orderIndex');
        if (indexEl) indexEl.textContent = `${idx + 1}.`;
      });
    }

    function cleanupDrag() {
      document.querySelectorAll('.dragClone').forEach(el => el.remove());
      currentDrag = null;
    }

    function submitAnswer(answer) {
      if (answered) return;
      socket.emit('player:submitAnswer', { roomCode, answer }, (res) => {
        if (!res?.ok) {
          alert(res?.error || 'Invio non riuscito.');
          return;
        }
        answered = true;
        renderWaiting('Risposta inviata. Aspetta il risultato.');
      });
    }

    function displayModeLabel(mode) {
      return {
        'host-only': 'Domanda sul maxischermo',
        'host-and-player': 'Domanda anche sul telefono',
        'player-only': 'Domanda solo sul telefono'
      }[mode] || 'Quiz live';
    }

    function startQuestionTimer(seconds) {
      stopQuestionTimer();
      questionDeadline = Date.now() + seconds * 1000;
      const tick = () => {
        const timerBox = document.getElementById('timerBox');
        if (!timerBox) return;
        const left = Math.max(0, Math.ceil((questionDeadline - Date.now()) / 1000));
        timerBox.textContent = `⏱️ ${left}s`;
        if (left <= 0) stopQuestionTimer();
      };
      tick();
      questionTimer = setInterval(tick, 250);
    }

    function stopQuestionTimer() {
      clearInterval(questionTimer);
      questionTimer = null;
      questionDeadline = null;
    }

    function renderQuestion(q) {
      currentQuestion = q;
      answered = false;
      displayMode = q.displayMode || displayMode;
      if (displayMode === 'host-only') renderAnswerOnly(q);
      else renderFullQuestion(q);
      startQuestionTimer(q.time || 20);
    }

    socket.on('roomState', (state) => {
      if (!joined) return;
      displayMode = state.displayMode || displayMode;
      roomTitle = state.roomTitle || roomTitle;
      if (state.status === 'lobby') renderWaiting('Sei in lobby. Aspetta che l’host avvii il quiz.');
      if (state.status === 'reveal' && answered) renderWaiting('Domanda chiusa. Guarda il risultato sullo schermo principale.');
      if (state.status === 'finished') renderWaiting('Quiz terminato. Grazie per aver giocato!');
    });

    socket.on('questionStarted', (question) => {
      renderQuestion(question);
    });

    socket.on('questionEnded', () => {
      if (!answered) renderWaiting('Tempo scaduto. Aspetta la prossima domanda.');
    });

    socket.on('quizFinished', () => {
      renderWaiting('Quiz terminato. Grazie per aver partecipato!');
    });

    renderJoin();
  </script>
</body>
</html>
