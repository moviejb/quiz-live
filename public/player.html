<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Live - Player</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --panel: rgba(17,24,39,.95);
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --green: #22c55e;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --red: #ef4444;
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, var(--bg), var(--bg-2));
      color: var(--text);
      padding: 16px;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(100%, 700px);
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 20px 40px rgba(0,0,0,.28);
      padding: 20px;
      display: grid;
      gap: 16px;
    }
    h1, h2, p { margin: 0; }
    .muted { color: var(--muted); }
    input, button, textarea {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
    }
    input, textarea {
      background: #0b1220;
      color: white;
      border: 1px solid rgba(255,255,255,.12);
    }
    button { font-weight: 800; cursor: pointer; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .joinBtn { background: var(--green); color: #052e16; }
    .submitBtn { background: var(--yellow); color: #422006; }
    .smallBtn { width: auto; padding: 12px 14px; background: var(--blue); color: white; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .answerBtn {
      background: var(--panel-2);
      color: white;
      min-height: 90px;
      line-height: 1.3;
      display: grid;
      gap: 10px;
      align-content: center;
      justify-items: center;
      text-align: center;
    }
    .questionImage,
    .optionImage,
    .orderImage {
      width: 100%;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
    }
    .questionImage img,
    .optionImage img,
    .orderImage img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 280px;
      object-fit: contain;
      background: #0b1220;
    }
    .questionImage img { max-height: 320px; }
    .answerBtn .optionImage img { max-height: 180px; }
    .optionText, .orderLabel {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
    }
    .answerBtn.true { background: #14532d; }
    .answerBtn.false { background: #7f1d1d; }
    .toolbar { display: flex; gap: 10px; justify-content: flex-end; }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--panel-2);
      border-radius: 16px;
      padding: 14px;
    }
    .ghost {
      background: transparent;
      border: 1px dashed rgba(255,255,255,.2);
      color: var(--muted);
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(59,130,246,.15);
      color: #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
    }
    .timerWrap {
      display: flex;
      justify-content: center;
      margin: 6px 0 2px;
    }
    .timerCircle {
      --timer-size: 120px;
      --timer-color: #22c55e;
      width: var(--timer-size);
      height: var(--timer-size);
      position: relative;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.25));
    }
    .timerCircle svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .timerTrack {
      fill: none;
      stroke: rgba(255,255,255,.12);
      stroke-width: 10;
    }
    .timerRing {
      fill: none;
      stroke: var(--timer-color);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset .22s linear, stroke .22s ease;
    }
    .timerCenter {
      position: absolute;
      inset: 18px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), rgba(2,6,23,.94));
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1;
      box-shadow: inset 0 0 18px rgba(255,255,255,.06);
    }
    .timerNumber {
      font-size: 34px;
      font-weight: 900;
      color: #fff;
    }
    .timerUnit {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: .08em;
      margin-top: 4px;
    }
    .orderHelp {
      margin: -4px 0 4px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .orderHelp {
      font-size: 14px;
      line-height: 1.4;
      color: var(--muted);
      margin-top: -4px;
    }
    .orderList {
      display: grid;
      gap: 10px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .dragRow {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      background: var(--panel-2);
      border-radius: 16px;
      padding: 14px;
      border: 2px solid transparent;
      position: relative;
      touch-action: none;
      box-shadow: 0 8px 18px rgba(0,0,0,.16);
    }
    .dragRow.dragging-source {
      opacity: .18;
      border-style: dashed;
      border-color: rgba(255,255,255,.25);
    }
    .dragRow.drag-over {
      border-color: rgba(59,130,246,.85);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }
    .dragClone {
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: min(680px, calc(100vw - 24px));
      max-width: calc(100vw - 24px);
      pointer-events: none;
      transform: translate3d(0,0,0);
      opacity: .96;
      box-shadow: 0 22px 40px rgba(0,0,0,.32);
    }
    .dragHandle {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      color: #bfdbfe;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }
    .orderIndex {
      min-width: 28px;
      font-weight: 900;
      color: #bfdbfe;
    }
    .orderText {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }

    .imageOrderThumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background-repeat: no-repeat;
      background-color: #0b1220;
      background-origin: border-box;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    @media (max-width: 560px) {
      .grid2 { grid-template-columns: 1fr; }
      .dragRow {
        grid-template-columns: auto 1fr;
      }
      .dragHandle {
        order: 3;
        width: 36px;
        height: 36px;
        justify-self: end;
      }
    }

    .imagePuzzleGrid {
  display: grid;
  gap: 10px;
  width: min(100%, 520px);
  margin: 0 auto;
}

.imagePuzzleTile {
  position: relative;
  border: 2px solid transparent;
  border-radius: 16px;
  background: var(--panel-2);
  padding: 8px;
  cursor: pointer;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}

.imagePuzzleTile:active {
  transform: scale(.98);
}

.imagePuzzleTile.selected {
  border-color: #f59e0b;
  box-shadow: 0 0 0 4px rgba(245,158,11,.18);
}

.imagePuzzleTile.correctSpot {
  border-color: rgba(34,197,94,.45);
}

.imagePuzzleIndex {
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: 2;
  min-width: 28px;
  height: 28px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 13px;
  font-weight: 900;
  background: rgba(2,6,23,.82);
  color: #fff;
  border: 1px solid rgba(255,255,255,.12);
}

.imageOrderThumb {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 12px;
  background-repeat: no-repeat;
  background-color: #0b1220;
  border: 1px solid rgba(255,255,255,.08);
  overflow: hidden;
}

  </style>
</head>
<body>
  <div class="card">
    <div id="app"></div>
  </div>

  <script>
    const socket = io();
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);

    let roomCode = params.get('room')?.toUpperCase() || '';
    let playerName = '';
    let joined = false;
    let answered = false;
    let currentQuestion = null;
    let orderItems = [];
    let roomTitle = 'Quiz Live';
    let displayMode = 'host-only';
    let questionTimer = null;
    let questionDeadline = null;
    let currentDrag = null;

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderTimerMarkup(seconds) {
      return `
        <div class="timerWrap">
          <div class="timerCircle" id="timerCircle">
            <svg viewBox="0 0 120 120" aria-hidden="true">
              <circle class="timerTrack" cx="60" cy="60" r="46"></circle>
              <circle class="timerRing" id="timerRing" cx="60" cy="60" r="46"></circle>
            </svg>
            <div class="timerCenter">
              <div>
                <div class="timerNumber" id="timerNumber">${seconds}</div>
                <div class="timerUnit">SECONDI</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function timerColor(progress) {
      if (progress > 0.6) return '#22c55e';
      if (progress > 0.3) return '#f59e0b';
      return '#ef4444';
    }

    function updateTimerVisual(leftSeconds, totalSeconds) {
      const numberEl = document.getElementById('timerNumber');
      const ringEl = document.getElementById('timerRing');
      const circleEl = document.getElementById('timerCircle');
      if (!numberEl || !ringEl || !circleEl) return;

      const radius = 46;
      const circumference = 2 * Math.PI * radius;
      const safeTotal = Math.max(1, totalSeconds || 1);
      const progress = Math.max(0, Math.min(1, leftSeconds / safeTotal));
      const color = timerColor(progress);

      ringEl.style.strokeDasharray = String(circumference);
      ringEl.style.strokeDashoffset = String(circumference * (1 - progress));
      ringEl.style.stroke = color;
      circleEl.style.setProperty('--timer-color', color);
      numberEl.textContent = leftSeconds;
    }

    function renderJoin(message = '') {
      app.innerHTML = `
        <h1>📱 Entra nel quiz</h1>
        <p class="muted">Inserisci il codice stanza e il tuo nome.</p>
        <input id="roomInput" placeholder="Codice stanza" maxlength="6" value="${escapeHtml(roomCode)}" />
        <input id="nameInput" placeholder="Il tuo nome" maxlength="20" value="${escapeHtml(playerName)}" />
        <button class="joinBtn" id="joinBtn">Entra</button>
        <p id="joinMsg" class="muted">${escapeHtml(message)}</p>
      `;

      document.getElementById('joinBtn').addEventListener('click', () => {
        roomCode = document.getElementById('roomInput').value.trim().toUpperCase();
        playerName = document.getElementById('nameInput').value.trim();
        socket.emit('player:joinRoom', { roomCode, name: playerName }, (res) => {
          if (!res?.ok) {
            renderJoin(res?.error || 'Errore di accesso.');
            return;
          }
          joined = true;
          roomCode = res.roomCode;
          roomTitle = res.title || 'Quiz Live';
          displayMode = res.displayMode || 'host-only';
          renderWaiting('Sei entrato nella lobby. Aspetta la prima domanda.');
        });
      });
    }

    function normalizeOption(option, idx) {
      if (option && typeof option === 'object' && !Array.isArray(option)) {
        return {
          id: option.id ?? `opt-${idx}`,
          text: option.text ?? option.label ?? '',
          image: option.image || option.img || '',
          alt: option.alt || option.text || option.label || `Opzione ${idx + 1}`
        };
      }
      return {
        id: `opt-${idx}`,
        text: String(option ?? ''),
        image: '',
        alt: String(option ?? '') || `Opzione ${idx + 1}`
      };
    }

    function normalizeOrderItem(item, idx) {
      if (item && typeof item === 'object' && !Array.isArray(item)) {
        return {
          id: String(item.id ?? item.value ?? item.text ?? `item-${idx}`),
          text: item.text ?? item.label ?? '',
          image: item.image || item.img || '',
          alt: item.alt || item.text || item.label || `Elemento ${idx + 1}`
        };
      }
      return {
        id: String(item ?? `item-${idx}`),
        text: String(item ?? ''),
        image: '',
        alt: String(item ?? '') || `Elemento ${idx + 1}`
      };
    }

    function renderQuestionImage(src, alt = 'Immagine domanda') {
      if (!src) return '';
      return `
        <div class="questionImage">
          <img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" loading="lazy">
        </div>
      `;
    }

    function renderOptionContent(option, idx, showLabel = true) {
      const data = normalizeOption(option, idx);
      const label = showLabel ? `<div class="optionText"><strong>${String.fromCharCode(65 + idx)}</strong>${data.text ? `<br>${escapeHtml(data.text)}` : ''}</div>` : (data.text ? `<div class="optionText">${escapeHtml(data.text)}</div>` : '');
      const image = data.image ? `<div class="optionImage"><img src="${escapeHtml(data.image)}" alt="${escapeHtml(data.alt)}" loading="lazy"></div>` : '';
      return `${image}${label}`;
    }

    function renderOrderEntryContent(entry) {
      if (entry?.sourceType === 'image-order') {
        return renderImageOrderPiece(entry);
      }
      const image = entry.image ? `<div class="orderImage"><img src="${escapeHtml(entry.image)}" alt="${escapeHtml(entry.alt || entry.text || 'Elemento')}" loading="lazy"></div>` : '';
      const text = entry.text ? `<div class="orderLabel">${escapeHtml(entry.text)}</div>` : '';
      return `${image}${text}`;
    }

    function buildImageOrderPieces(q) {
      const rows = Math.max(1, Number(q?.rows) || 2);
      const cols = Math.max(1, Number(q?.cols) || 2);
      const image = q?.questionImage || '';
      const altBase = q?.questionImageAlt || q?.question || 'Immagine domanda';
      const pieces = [];

      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          const idx = r * cols + c;
          pieces.push({
            id: `p${idx}`,
            text: '',
            image,
            alt: `${altBase} - pezzo ${idx + 1}`,
            row: r,
            col: c,
            rows,
            cols,
            sourceType: 'image-order'
          });
        }
      }
      return pieces;
    }

    function shuffleArray(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getShuffledImageOrderPieces(q) {
      const base = buildImageOrderPieces(q);
      if (base.length <= 1) return base;

      let shuffled = shuffleArray(base);
      let guard = 0;
      while (guard < 10 && shuffled.every((item, idx) => item.id === `p${idx}`)) {
        shuffled = shuffleArray(base);
        guard += 1;
      }
      return shuffled;
    }

    function renderImageOrderPiece(entry) {
      const cols = Math.max(1, Number(entry?.cols) || 1);
      const rows = Math.max(1, Number(entry?.rows) || 1);
      const col = Math.max(0, Number(entry?.col) || 0);
      const row = Math.max(0, Number(entry?.row) || 0);
      const bgX = cols <= 1 ? '50%' : `${(col / (cols - 1)) * 100}%`;
      const bgY = rows <= 1 ? '50%' : `${(row / (rows - 1)) * 100}%`;
      return `<div class="imageOrderThumb" aria-label="${escapeHtml(entry?.alt || 'Pezzo immagine')}" style="background-image:url('${escapeHtml(entry?.image || '')}');background-size:${cols * 100}% ${rows * 100}%;background-position:${bgX} ${bgY};"></div>`;
    }

    function getOrderAnswerValue(entry) {
      return String(entry?.id ?? entry?.text ?? '');
    }

    function renderHeader(extra = '') {
      return `
        <div>
          <h1>${escapeHtml(roomTitle)}</h1>
          <p class="muted"><strong>${escapeHtml(playerName || 'Giocatore')}</strong> • stanza ${escapeHtml(roomCode)}</p>
        </div>
        ${extra}
      `;
    }

    function renderWaiting(text) {
      stopQuestionTimer();
      cleanupDrag();
      app.innerHTML = `
        ${renderHeader(`
          <div class="pill">${displayModeLabel(displayMode)}</div>
        `)}
        <div class="item ghost">${escapeHtml(text)}</div>
      `;
    }

    function getRemainingSeconds(fallbackSeconds = 20) {
      if (!questionDeadline) return fallbackSeconds;
      return Math.max(1, Math.ceil((questionDeadline - Date.now()) / 1000));
    }

    function renderMissingDataMessage(meta, text) {
      cleanupDrag();
      app.innerHTML = `
        ${renderHeader(meta)}
        <div class="item ghost">${escapeHtml(text)}</div>
      `;
    }

function renderAnswerOnly(q) {
  const seconds = q.time || 20;
  const meta = `
    <div class="meta">
      <div class="pill">Rispondi dal telefono</div>
      <div class="pill">Tempo: ${seconds}s</div>
    </div>
    ${renderTimerMarkup(seconds)}
  `;

  if (q.type === 'multiple' || q.type === 'image-pieces') {
    const normalizedOptions = Array.isArray(q.options) ? q.options.map((opt, idx) => normalizeOption(opt, idx)) : [];
    const optionCount = normalizedOptions.length || (q.optionCount || 4);

   app.innerHTML = `
  ${renderHeader(meta)}
  <div class="grid2" id="answersGrid"></div>
`;

    const grid = document.getElementById('answersGrid');
    if (normalizedOptions.length) {
      normalizedOptions.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'answerBtn';
        btn.innerHTML = renderOptionContent(opt, idx, true);
        btn.addEventListener('click', () => submitAnswer({ selectedIndex: idx }));
        grid.appendChild(btn);
      });
    } else {
      ['A', 'B', 'C', 'D'].slice(0, optionCount).forEach((label, idx) => {
        const btn = document.createElement('button');
        btn.className = 'answerBtn';
        btn.innerHTML = `<div class="optionText"><strong>${label}</strong></div>`;
        btn.addEventListener('click', () => submitAnswer({ selectedIndex: idx }));
        grid.appendChild(btn);
      });
    }
  } else if (q.type === 'truefalse') {
    app.innerHTML = `
  ${renderHeader(meta)}
  <div class="grid2">
    <button class="answerBtn true" id="trueBtn">VERO</button>
    <button class="answerBtn false" id="falseBtn">FALSO</button>
  </div>
`;
    document.getElementById('trueBtn').addEventListener('click', () => submitAnswer({ value: true }));
    document.getElementById('falseBtn').addEventListener('click', () => submitAnswer({ value: false }));
  } else if (q.type === 'text') {
   app.innerHTML = `
  ${renderHeader(meta)}
  <input id="textAnswer" placeholder="Scrivi qui la risposta" />
  <button class="submitBtn" id="sendText">Invia risposta</button>
`;
    const input = document.getElementById('textAnswer');
    document.getElementById('sendText').addEventListener('click', () => submitAnswer({ text: input.value }));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAnswer({ text: input.value });
    });
  } else if (q.type === 'order') {
    if (!Array.isArray(q.items) || !q.items.length) {
      renderMissingDataMessage(meta, 'Questa domanda non può essere mostrata: mancano gli elementi da ordinare.');
      return;
    }
    orderItems = q.items.map((item, idx) => normalizeOrderItem(item, idx));
    renderOrderList(false);
   } else if (q.type === 'image-order') {
    if (!q.questionImage) {
      renderMissingDataMessage(meta, 'Questa domanda non può essere mostrata: manca l’immagine da dividere.');
      return;
    }
    orderItems = getShuffledImageOrderPieces(q);
    renderImagePuzzle(false);
  } else {
    renderMissingDataMessage(meta, 'Tipo di domanda non supportato.');
  }
}

    function renderFullQuestion(q) {
      const seconds = q.time || 20;
      const header = `
        <div class="meta">
          <div class="pill">${escapeHtml(q.disciplina || 'Quiz')}</div>
          <div class="pill">${escapeHtml(q.argomento || 'Generale')}</div>
          <div class="pill">Domanda ${q.index || '—'}/${q.total || '—'}</div>
          <div class="pill">Tempo: ${seconds}s</div>
        </div>
        ${renderTimerMarkup(seconds)}
      `;

      if (q.type === 'multiple') {
        const options = Array.isArray(q.options) ? q.options.map((opt, idx) => normalizeOption(opt, idx)) : [];
        if (!options.length) {
          renderMissingDataMessage(header, 'Questa domanda non può essere mostrata: mancano le opzioni di risposta.');
          return;
        }

        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question)}</h2>
          ${renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda')}
          <div class="grid2" id="answersGrid"></div>
        `;
        const grid = document.getElementById('answersGrid');
        options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'answerBtn';
          btn.innerHTML = renderOptionContent(opt, idx, true);
          btn.addEventListener('click', () => submitAnswer({ selectedIndex: idx }));
          grid.appendChild(btn);
        });
      } else if (q.type === 'truefalse') {
        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question)}</h2>
          ${renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda')}
          <div class="grid2">
            <button class="answerBtn true" id="trueBtn">VERO</button>
            <button class="answerBtn false" id="falseBtn">FALSO</button>
          </div>
        `;
        document.getElementById('trueBtn').addEventListener('click', () => submitAnswer({ value: true }));
        document.getElementById('falseBtn').addEventListener('click', () => submitAnswer({ value: false }));
      } else if (q.type === 'text') {
        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question)}</h2>
          ${renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda')}
          <input id="textAnswer" placeholder="Scrivi qui la risposta" />
          <button class="submitBtn" id="sendText">Invia risposta</button>
        `;
        const input = document.getElementById('textAnswer');
        document.getElementById('sendText').addEventListener('click', () => submitAnswer({ text: input.value }));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') submitAnswer({ text: input.value });
        });
      } else if (q.type === 'image-pieces') {
        const options = Array.isArray(q.options) ? q.options.map((opt, idx) => normalizeOption(opt, idx)) : [];
        if (!options.length) {
          renderMissingDataMessage(header, 'Questa domanda non può essere mostrata: mancano le opzioni di risposta.');
          return;
        }

        const showImageOnPhone = displayMode !== 'host-only';
        const helperText =
          displayMode === 'host-and-player'
            ? ''
            : displayMode === 'player-only'
              ? ''
              : '<div class="item ghost">Osserva l’immagine sullo schermo principale e rispondi dal telefono.</div>';

        app.innerHTML = `
          ${renderHeader(header)}
          <h2>${escapeHtml(q.question || '')}</h2>
          ${showImageOnPhone ? renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda') : ''}
          ${helperText}
          <div class="grid2" id="answersGrid"></div>
        `;

        const grid = document.getElementById('answersGrid');
        options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'answerBtn';
          btn.innerHTML = renderOptionContent(opt, idx, true);
          btn.addEventListener('click', () => submitAnswer({ selectedIndex: idx }));
          grid.appendChild(btn);
        });
      } else if (q.type === 'order') {
        if (!Array.isArray(q.items) || !q.items.length) {
          renderMissingDataMessage(header, 'Questa domanda non può essere mostrata: mancano gli elementi da ordinare.');
          return;
        }
        orderItems = q.items.map((item, idx) => normalizeOrderItem(item, idx));
        renderOrderList(true);
     } else if (q.type === 'image-order') {
  if (!q.questionImage) {
    renderMissingDataMessage(header, 'Questa domanda non può essere mostrata: manca l’immagine da dividere.');
    return;
  }
  orderItems = getShuffledImageOrderPieces(q);
  renderImagePuzzle(true);
} else {
        renderMissingDataMessage(header, 'Tipo di domanda non supportato.');
      }
    }

function renderOrderList(showQuestion) {
  const q = currentQuestion;

  if (!q || !Array.isArray(orderItems) || !orderItems.length) {
    cleanupDrag();
    app.innerHTML = `
      ${renderHeader()}
      <div class="item ghost">Nessun elemento disponibile da ordinare.</div>
    `;
    return;
  }

  const helperText = q.type === 'image-order'
    ? 'Trascina i pezzi della foto nel giusto ordine e poi conferma.'
    : 'Trascina gli elementi nell’ordine corretto e poi conferma.';

  const top = showQuestion
  ? `<h2>${escapeHtml(q.question)}</h2>${q.type === 'image-order' ? (displayMode !== 'host-only' ? renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda') : '') : renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda')}`
  : `<div class="item ghost">${helperText}</div>`;

  const seconds = getRemainingSeconds(q.time || 20);

  cleanupDrag();
  app.innerHTML = `
    ${renderHeader(`
      <div class="meta">
        ${showQuestion
          ? `<div class="pill">${escapeHtml(q.disciplina || 'Quiz')}</div><div class="pill">${escapeHtml(q.argomento || 'Generale')}</div>`
          : '<div class="pill">Ordina dal telefono</div>'}
        <div class="pill">Tempo: ${seconds}s</div>
      </div>
      ${renderTimerMarkup(seconds)}
    `)}
    ${top}
    <p class="orderHelp">${q.type === 'image-order' ? 'Rimetti i pezzi da sinistra a destra, dall’alto in basso.' : 'Tieni premuto e trascina ogni riga nella posizione giusta.'}</p>
    <div id="orderList" class="orderList"></div>
    <button class="submitBtn" id="sendOrder">Conferma ordine</button>
  `;

  const list = document.getElementById('orderList');
  orderItems.forEach((entry, idx) => {
    const row = document.createElement('div');
    row.className = 'dragRow';
    row.dataset.id = entry.id;
    row.innerHTML = `
      <div class="orderIndex">${idx + 1}.</div>
      <div class="orderText">${renderOrderEntryContent(entry)}</div>
      <div class="dragHandle" aria-hidden="true">⋮⋮</div>
    `;
    list.appendChild(row);
  });

  enableOrderDrag(list);

  document.getElementById('sendOrder').addEventListener('click', () => {
    submitAnswer({ order: orderItems.map(item => getOrderAnswerValue(item)) });
  });
}


let selectedPuzzleIndex = -1;

function swapPuzzleItems(indexA, indexB) {
  if (
    indexA < 0 || indexB < 0 ||
    indexA >= orderItems.length ||
    indexB >= orderItems.length ||
    indexA === indexB
  ) return;

  const temp = orderItems[indexA];
  orderItems[indexA] = orderItems[indexB];
  orderItems[indexB] = temp;
}

function isPuzzleSolvedPosition(entry, index, cols) {
  const expectedId = `p${index}`;
  return String(entry?.id || '') === expectedId;
}

function renderImagePuzzle(showQuestion) {
  const q = currentQuestion;

  if (!q || !Array.isArray(orderItems) || !orderItems.length) {
    cleanupDrag();
    app.innerHTML = `
      ${renderHeader()}
      <div class="item ghost">Nessun pezzo disponibile.</div>
    `;
    return;
  }

  const rows = Math.max(1, Number(q.rows) || 2);
  const cols = Math.max(1, Number(q.cols) || 2);
  const seconds = getRemainingSeconds(q.time || 20);

  const top = showQuestion
    ? `<h2>${escapeHtml(q.question)}</h2>${
        displayMode !== 'host-only'
          ? renderQuestionImage(q.questionImage, q.questionImageAlt || q.question || 'Immagine domanda')
          : ''
      }`
    : `<div class="item ghost">Sistema i pezzi come un puzzle e poi conferma.</div>`;

  cleanupDrag();

  app.innerHTML = `
    ${renderHeader(`
      <div class="meta">
        ${
          showQuestion
            ? `<div class="pill">${escapeHtml(q.disciplina || 'Quiz')}</div>
               <div class="pill">${escapeHtml(q.argomento || 'Generale')}</div>`
            : `<div class="pill">Puzzle dal telefono</div>`
        }
        <div class="pill">Tempo: ${seconds}s</div>
      </div>
      ${renderTimerMarkup(seconds)}
    `)}
    ${top}
    <p class="orderHelp">Tocca un pezzo e poi toccane un altro per scambiarli, finché l’immagine torna corretta.</p>
    <div id="imagePuzzleGrid" class="imagePuzzleGrid" style="grid-template-columns: repeat(${cols}, 1fr);"></div>
    <button class="submitBtn" id="sendOrder">Conferma puzzle</button>
  `;

  renderImagePuzzleTiles(cols);

  document.getElementById('sendOrder').addEventListener('click', () => {
    submitAnswer({ order: orderItems.map(item => getOrderAnswerValue(item)) });
  });
}

function renderImagePuzzleTiles(cols) {
  const grid = document.getElementById('imagePuzzleGrid');
  if (!grid) return;

  grid.innerHTML = '';

  orderItems.forEach((entry, idx) => {
    const tile = document.createElement('button');
    tile.type = 'button';
    tile.className = 'imagePuzzleTile';
    if (idx === selectedPuzzleIndex) tile.classList.add('selected');
    if (isPuzzleSolvedPosition(entry, idx, cols)) tile.classList.add('correctSpot');

    tile.innerHTML = `
      <div class="imagePuzzleIndex">${idx + 1}</div>
      ${renderImageOrderPiece(entry)}
    `;

    tile.addEventListener('click', () => {
      if (answered) return;

      if (selectedPuzzleIndex === -1) {
        selectedPuzzleIndex = idx;
        renderImagePuzzleTiles(cols);
        return;
      }

      if (selectedPuzzleIndex === idx) {
        selectedPuzzleIndex = -1;
        renderImagePuzzleTiles(cols);
        return;
      }

      swapPuzzleItems(selectedPuzzleIndex, idx);
      selectedPuzzleIndex = -1;
      renderImagePuzzleTiles(cols);
    });

    grid.appendChild(tile);
  });
}


    function enableOrderDrag(list) {
      const rows = () => [...list.querySelectorAll('.dragRow')];

      rows().forEach((row) => {
        row.addEventListener('pointerdown', (event) => {
          if (answered) return;
          if (event.button !== undefined && event.button !== 0) return;

          event.preventDefault();

          const rect = row.getBoundingClientRect();
          const clone = row.cloneNode(true);
          clone.classList.add('dragClone');

          const offsetY = event.clientY - rect.top;
          const offsetX = event.clientX - rect.left;

          clone.style.width = `${rect.width}px`;
          clone.style.left = `${rect.left}px`;
          clone.style.top = `${rect.top}px`;
          document.body.appendChild(clone);

          row.classList.add('dragging-source');

          currentDrag = {
            list,
            row,
            clone,
            offsetY,
            offsetX,
            pointerId: event.pointerId
          };

          row.setPointerCapture?.(event.pointerId);
          moveDrag(event.clientX, event.clientY);

          const onMove = (e) => {
            if (!currentDrag || e.pointerId !== currentDrag.pointerId) return;
            e.preventDefault();
            moveDrag(e.clientX, e.clientY);
            reorderByPointer(e.clientY);
          };

          const onUp = (e) => {
            if (!currentDrag || e.pointerId !== currentDrag.pointerId) return;
            finishDrag();
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            window.removeEventListener('pointercancel', onUp);
          };

          window.addEventListener('pointermove', onMove, { passive: false });
          window.addEventListener('pointerup', onUp);
          window.addEventListener('pointercancel', onUp);
        });
      });

      function moveDrag(clientX, clientY) {
        if (!currentDrag) return;
        currentDrag.clone.style.left = `${clientX - currentDrag.offsetX}px`;
        currentDrag.clone.style.top = `${clientY - currentDrag.offsetY}px`;
      }

      function reorderByPointer(clientY) {
        if (!currentDrag) return;
        const siblings = rows().filter(el => el !== currentDrag.row);

        let target = null;
        let placeAfter = false;

        siblings.forEach((el) => {
          const rect = el.getBoundingClientRect();
          const middle = rect.top + rect.height / 2;
          el.classList.remove('drag-over');

          if (clientY < middle && !target) {
            target = el;
            placeAfter = false;
          } else if (clientY >= middle) {
            target = el;
            placeAfter = true;
          }
        });

        rows().forEach(el => el.classList.remove('drag-over'));

        if (!target) {
          list.insertBefore(currentDrag.row, list.firstChild);
          if (list.firstChild) list.firstChild.classList.add('drag-over');
          return;
        }

        target.classList.add('drag-over');
        if (placeAfter) {
          list.insertBefore(currentDrag.row, target.nextSibling);
        } else {
          list.insertBefore(currentDrag.row, target);
        }
      }

      function finishDrag() {
        if (!currentDrag) return;
        currentDrag.clone.remove();
        rows().forEach(el => {
          el.classList.remove('drag-over');
          el.classList.remove('dragging-source');
        });

        syncOrderFromDOM();
        currentDrag = null;
      }
    }

    function syncOrderFromDOM() {
      const list = document.getElementById('orderList');
      if (!list) return;

      const ids = [...list.querySelectorAll('.dragRow')].map(row => row.dataset.id);
      orderItems = ids
        .map(id => orderItems.find(item => item.id === id))
        .filter(Boolean);

      [...list.querySelectorAll('.dragRow')].forEach((row, idx) => {
        const indexEl = row.querySelector('.orderIndex');
        if (indexEl) indexEl.textContent = `${idx + 1}.`;
      });
    }

    function cleanupDrag() {
      document.querySelectorAll('.dragClone').forEach(el => el.remove());
      currentDrag = null;
    }

    function submitAnswer(answer) {
      if (answered) return;
      socket.emit('player:submitAnswer', { roomCode, answer }, (res) => {
        if (!res?.ok) {
          alert(res?.error || 'Invio non riuscito.');
          return;
        }
        answered = true;
        renderWaiting('Risposta inviata. Aspetta il risultato.');
      });
    }

    function displayModeLabel(mode) {
      return {
        'host-only': 'Domanda sul maxischermo',
        'host-and-player': 'Domanda anche sul telefono',
        'player-only': 'Domanda solo sul telefono'
      }[mode] || 'Quiz live';
    }

    function startQuestionTimer(seconds) {
      stopQuestionTimer();
      const totalSeconds = Math.max(1, Number(seconds) || 20);
      questionDeadline = Date.now() + totalSeconds * 1000;
      const tick = () => {
        const left = Math.max(0, Math.ceil((questionDeadline - Date.now()) / 1000));
        updateTimerVisual(left, totalSeconds);
        if (left <= 0) stopQuestionTimer();
      };
      tick();
      questionTimer = setInterval(tick, 250);
    }

    function stopQuestionTimer() {
      clearInterval(questionTimer);
      questionTimer = null;
      questionDeadline = null;
    }

    function renderQuestion(q) {
      currentQuestion = q;
      answered = false;
      displayMode = q.displayMode || displayMode;
      if (displayMode === 'host-only') renderAnswerOnly(q);
      else renderFullQuestion(q);
      startQuestionTimer(q.time || 20);
    }

    socket.on('roomState', (state) => {
      if (!joined) return;
      displayMode = state.displayMode || displayMode;
      roomTitle = state.roomTitle || roomTitle;
      if (state.status === 'lobby') renderWaiting('Sei in lobby. Aspetta che l’host avvii il quiz.');
      if (state.status === 'reveal' && answered) renderWaiting('Domanda chiusa. Guarda il risultato sullo schermo principale.');
      if (state.status === 'finished') renderWaiting('Quiz terminato. Grazie per aver giocato!');
    });

    socket.on('questionStarted', (question) => {
      renderQuestion(question);
    });

    socket.on('questionEnded', () => {
      if (!answered) renderWaiting('Tempo scaduto. Aspetta la prossima domanda.');
    });

    socket.on('quizFinished', () => {
      renderWaiting('Quiz terminato. Grazie per aver partecipato!');
    });

    renderJoin();
  </script>
